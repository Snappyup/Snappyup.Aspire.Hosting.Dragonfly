# Mark stale issues/PRs (optional hygiene for public repos).
# https://github.com/actions/stale

name: Stale

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ github.token }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >-
            This issue has been inactive for a while and is labeled stale.
            Comment or it will be closed in two weeks if there is no further activity.
          stale-pr-message: >-
            This pull request has been inactive and is labeled stale.
            Push a commit or comment to keep it open.
          close-issue-message: >-
            Closing as stale. Reopen if this is still relevant.
          close-pr-message: >-
            Closing as stale. Reopen when you are ready to continue.
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,dependencies
